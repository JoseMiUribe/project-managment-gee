<script>
/* ==========================================================================
   PM Copilot Dashboard — lógica de frontend (MODO NUBE, Apps Script)

   Copia adaptada de dashboard/public/app.js. El contrato de API "URLs REST"
   original (GET /api/data, PUT /api/gee/:tipo/:id, ...) se conserva tal cual
   como vocabulario interno — apiGet/apiSend siguen aceptando esas mismas
   cadenas — pero la implementación ya no hace fetch() a un Express local:
   traduce cada URL a una llamada google.script.run contra Code.gs, que lee/
   escribe la Google Sheet del cliente en vez de markdown. Ver la tabla RUTAS
   más abajo. El resto de este archivo (2000+ líneas: render de pestañas,
   formularios, gráficos) es una copia sin cambios del modo local — solo se
   tocaron apiGet/apiSend, doGeneratePdf/doGeneratePdfDocumento (PDF con
   Playwright no existe aquí, se sustituye por "imprimir desde el navegador")
   y renderDocumentoRow (el contenido de los documentos sueltos no viaja a la
   nube, solo su metadato — ver README.md de esta carpeta).
   ========================================================================== */

(function () {
  "use strict";

  /** Estado global en memoria con el último snapshot recibido del backend. */
  let state = null;

  /** Charts ECharts instanciados, indexados por id de contenedor, para poder hacer resize/dispose. */
  const chartInstances = {};

  const ECHARTS_AVAILABLE = typeof echarts !== "undefined";

  // ------------------------------------------------------------------
  // Utilidades genéricas
  // ------------------------------------------------------------------

  function qs(sel, root) {
    return (root || document).querySelector(sel);
  }
  function qsa(sel, root) {
    return Array.from((root || document).querySelectorAll(sel));
  }

  /** Extrae el primer número de un valor que puede venir como texto libre,
   *  p.ej. "30 pts (según `output-paso-2/capacidad-equipo/` v1)" -> 30.
   *  Los campos de capacidad/roadmap se redactan en markdown, no son
   *  garantizados como número puro. */
  function extraerNumero(value) {
    if (value === null || value === undefined) return 0;
    if (typeof value === "number") return value;
    const match = String(value).match(/-?\d+([.,]\d+)?/);
    if (!match) return 0;
    return Number(match[0].replace(",", ".")) || 0;
  }

  function escapeHtml(value) {
    if (value === null || value === undefined) return "";
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  /** Devuelve texto seguro para mostrar, con un placeholder si no hay dato. */
  function fmt(value, placeholder) {
    if (value === null || value === undefined || value === "") {
      return placeholder !== undefined ? placeholder : "—";
    }
    return String(value);
  }

  function el(tag, attrs, children) {
    const node = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach((key) => {
        if (key === "class") node.className = attrs[key];
        else if (key === "html") node.innerHTML = attrs[key];
        else if (key === "text") node.textContent = attrs[key];
        else node.setAttribute(key, attrs[key]);
      });
    }
    (children || []).forEach((c) => {
      if (c) node.appendChild(c);
    });
    return node;
  }

  function showToast(message, type) {
    const container = qs("#toast-container");
    const toast = el("div", { class: "toast" + (type ? " toast-" + type : "") });
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = "0";
      toast.style.transition = "opacity 0.3s ease";
      setTimeout(() => toast.remove(), 300);
    }, 4000);
  }

  function setBtnLoading(btn, loading, loadingText) {
    if (!btn) return;
    if (loading) {
      btn.dataset.originalHtml = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span> <span class="btn-label">' + (loadingText || "Cargando…") + "</span>";
      btn.disabled = true;
    } else {
      if (btn.dataset.originalHtml) btn.innerHTML = btn.dataset.originalHtml;
      btn.disabled = false;
    }
  }

  /** RAG normalizado: acepta "verde"/"green"/"🟢" etc. y devuelve clave canónica + emoji. */
  function normalizeRag(raw) {
    if (!raw) return { key: "gris", emoji: "⚪", label: "Sin dato" };
    const v = String(raw).toLowerCase();
    if (v.includes("verde") || v.includes("green") || v.includes("🟢")) {
      return { key: "verde", emoji: "🟢", label: "Verde" };
    }
    if (v.includes("amarillo") || v.includes("yellow") || v.includes("ambar") || v.includes("ámbar") || v.includes("🟡")) {
      return { key: "amarillo", emoji: "🟡", label: "Amarillo" };
    }
    if (v.includes("rojo") || v.includes("red") || v.includes("🔴")) {
      return { key: "rojo", emoji: "🔴", label: "Rojo" };
    }
    return { key: "gris", emoji: "⚪", label: fmt(raw) };
  }

  /** Compara la palabra "núcleo" de una opción de <select> contra el valor
   *  guardado, ignorando emoji/prefijos en cualquiera de los dos lados
   *  (el markdown puede guardar "🟡 Amarillo" o "Amarillo" a secas). Evita
   *  que un desajuste de formato deje el <select> en su primera opción por
   *  defecto y sobrescriba el valor real al guardar. */
  function palabraNucleo(value) {
    return String(value || "")
      .toLowerCase()
      .replace(/[^\p{L}\p{N}\s]/gu, "")
      .trim();
  }
  function opcionCoincideConValor(opcion, valorActual) {
    const opcionNucleo = palabraNucleo(opcion);
    const valorNucleo = palabraNucleo(valorActual);
    if (!opcionNucleo || !valorNucleo) return false;
    return valorNucleo.includes(opcionNucleo) || opcionNucleo.includes(valorNucleo);
  }

  function ragBadge(raw) {
    const r = normalizeRag(raw);
    return '<span class="badge-rag rag-' + r.key + '">' + r.emoji + " " + escapeHtml(r.label) + "</span>";
  }

  function emptyState(icon, title, subtitle) {
    return (
      '<div class="empty-state"><div class="empty-icon">' +
      icon +
      "</div><p><strong>" +
      escapeHtml(title) +
      "</strong></p>" +
      (subtitle ? "<p>" + escapeHtml(subtitle) + "</p>" : "") +
      "</div>"
    );
  }

  function emptyInline(text) {
    return '<div class="empty-state-inline">' + escapeHtml(text) + "</div>";
  }

  // ------------------------------------------------------------------
  // Llamadas a la API (MODO NUBE: google.script.run, no fetch)
  // ------------------------------------------------------------------

  /** Inyectado por Index.html en tiempo de render (ver <?!= ... ?> al inicio del body). */
  const CLOUD = window.PM_CLOUD_CONFIG || {};

  // Traduce cada URL del contrato original a una función expuesta en Code.gs.
  // Los grupos capturados por la regex se pasan como argumentos adicionales,
  // en el mismo orden en que aparecen en la URL, decodificados con
  // decodeURIComponent (igual que antes hacía el propio Express router).
  const RUTAS = [
    { method: "POST", re: /^\/api\/sync$/, fn: "apiPostSync" },
    { method: "GET", re: /^\/api\/data$/, fn: "apiGetData" },
    { method: "PUT", re: /^\/api\/gee\/([^/]+)\/(.+)$/, fn: "apiPutGee" },
    { method: "POST", re: /^\/api\/gee\/([^/]+)$/, fn: "apiPostGee" },
    { method: "POST", re: /^\/api\/dailylog$/, fn: "apiPostDailylog" },
    { method: "PUT", re: /^\/api\/sprint\/hu\/(.+)$/, fn: "apiPutSprintHu" },
  ];

  function matchRuta(method, url) {
    const rawPath = url.split("?")[0];
    for (const r of RUTAS) {
      if (r.method !== method) continue;
      const m = rawPath.match(r.re);
      if (m) return { fn: r.fn, params: m.slice(1).map((p) => decodeURIComponent(p)) };
    }
    return null;
  }

  /** Envuelve google.script.run (basado en callbacks) en una Promise.
   *  Code.gs nunca lanza excepciones a través del puente RPC (los detalles de
   *  error no sobreviven bien esa frontera) — siempre devuelve
   *  { ok: true, data } o { ok: false, status, error }, que aquí se
   *  desempaqueta a exactamente lo mismo que devolvía res.json()/ApiError en
   *  modo local, para que el resto de este archivo no necesite saberlo. */
  function runGoogleScript(fnName, args) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler((result) => {
          if (result && result.ok === false) {
            reject(new ApiError(result.status || 500, result.error ? { error: result.error } : null));
          } else {
            resolve(result && result.data !== undefined ? result.data : result);
          }
        })
        .withFailureHandler((err) => {
          reject(new ApiError(500, { error: (err && err.message) || "Error inesperado del servidor." }));
        })
        [fnName].apply(null, [CLOUD.sheetId, CLOUD.proyectoId].concat(args));
    });
  }

  async function apiGet(url) {
    const match = matchRuta("GET", url);
    if (!match) throw new ApiError(404, { error: "Ruta no soportada en modo nube: GET " + url });
    return runGoogleScript(match.fn, match.params);
  }

  async function apiSend(method, url, body) {
    const match = matchRuta(method, url);
    if (!match) throw new ApiError(404, { error: "Ruta no soportada en modo nube: " + method + " " + url });
    return runGoogleScript(match.fn, match.params.concat([body || {}]));
  }

  function ApiError(status, body) {
    this.status = status;
    this.body = body;
    this.message = (body && (body.error || body.message)) || "Error de red (" + status + ")";
  }
  ApiError.prototype = Object.create(Error.prototype);

  // ------------------------------------------------------------------
  // Carga inicial y sync
  // ------------------------------------------------------------------

  async function loadInitial() {
    try {
      // Al cargar la página forzamos un sync completo, tal como pide el contrato.
      state = await apiSend("POST", "/api/sync");
      renderAll();
    } catch (err) {
      console.error("Fallo cargando /api/sync inicial, probando /api/data", err);
      try {
        state = await apiGet("/api/data");
        renderAll();
        showToast("No se pudo forzar la sincronización inicial, mostrando el último snapshot disponible.", "warn");
      } catch (err2) {
        console.error(err2);
        renderFatalError(err2);
      }
    }
  }

  async function doSync() {
    const btn = qs("#btn-sync");
    setBtnLoading(btn, true, "Actualizando…");
    try {
      state = await apiSend("POST", "/api/sync");
      renderAll();
      if (state.jiraSyncWarning) {
        showToast(state.jiraSyncWarning, "warn");
      } else if (state.proyecto && state.proyecto.jiraFuenteViva) {
        showToast("Datos actualizados, incluyendo estado en vivo de Jira.", "success");
      } else {
        showToast("Datos actualizados.", "success");
      }
    } catch (err) {
      console.error(err);
      showToast("Error al actualizar: " + err.message, "error");
    } finally {
      setBtnLoading(btn, false);
    }
  }

  // MODO NUBE: no hay Playwright/Chromium headless disponible en Apps Script.
  // En vez de generar el PDF en el servidor, se abre la vista de impresión
  // (misma plantilla HTML que /print en modo local, ver PrintView.gs) en una
  // pestaña nueva — el usuario hace Ctrl+P / Cmd+P y elige "Guardar como PDF"
  // con el propio Chromium de su navegador (mismo motor de renderizado que
  // usaba Playwright, misma fidelidad visual). Decisión confirmada con el PM.
  function urlVista(vista) {
    const base = window.location.href.split("?")[0];
    const params = new URLSearchParams({ sheet: CLOUD.sheetId, proyecto: CLOUD.proyectoId, vista: vista });
    return base + "?" + params.toString();
  }

  function doGeneratePdf() {
    window.open(urlVista("informe"), "_blank");
    showToast('Se abrió el informe en una pestaña nueva — usa Ctrl+P (Cmd+P en Mac) y elige "Guardar como PDF".', "success");
  }

  function renderFatalError(err) {
    const main = document.querySelector(".tabs-nav");
    if (main) main.insertAdjacentHTML(
      "afterend",
      '<div class="card" style="margin:24px;"><div class="empty-state"><div class="empty-icon">⚠️</div>' +
        "<p><strong>No se pudo cargar el dashboard.</strong></p>" +
        "<p>" + escapeHtml(err.message || String(err)) + "</p>" +
        "<p>Comprueba que el servidor Express local esté en marcha.</p></div></div>"
    );
  }

  // ------------------------------------------------------------------
  // Render orquestador
  // ------------------------------------------------------------------

  function renderAll() {
    if (!state) return;
    renderHeader();
    renderSprintTab();
    renderProyectoTab();
    renderGeeAll();
    renderRequisitosTab();
    renderDocumentosTab();
  }

  // ------------------------------------------------------------------
  // TAB: Documentos
  // ------------------------------------------------------------------

  function renderDocumentosTab() {
    const container = qs("#documentos-lista");
    const items = state.documentos || [];
    if (items.length === 0) {
      container.innerHTML = emptyState(
        "📁",
        "Todavía no hay documentos generados.",
        "Aparecerán aquí a medida que avances por los pasos del pipeline."
      );
      return;
    }

    const grupos = {};
    const orden = [];
    items.forEach((doc) => {
      if (!grupos[doc.paso]) {
        grupos[doc.paso] = [];
        orden.push(doc.paso);
      }
      grupos[doc.paso].push(doc);
    });

    container.innerHTML = orden
      .map((paso) => {
        const filas = grupos[paso].map((doc) => renderDocumentoRow(doc)).join("");
        return (
          '<div class="card"><h3>' +
          escapeHtml(paso) +
          '</h3><table class="data-table"><thead><tr>' +
          "<th>Documento</th><th>Ruta</th><th>Modificado</th><th></th>" +
          "</tr></thead><tbody>" +
          filas +
          "</tbody></table></div>"
        );
      })
      .join("");
  }

  // MODO NUBE: el catálogo de Documentos solo guarda metadatos (título, ruta,
  // tamaño, fecha) — el contenido real del .md sigue viviendo donde ya vivía
  // (disco local o carpeta sincronizada con Drive Desktop), sin integración
  // nueva con la API de Drive (decisión ya tomada, ver SKILL.md). Por eso no
  // hay aquí botones "Ver"/"MD"/"PDF": no hay contenido que este dashboard
  // pueda servir de forma remota, solo el catálogo de qué existe y dónde.
  function renderDocumentoRow(doc) {
    const modificado = doc.modificadoEn ? doc.modificadoEn.slice(0, 16).replace("T", " ") : "—";
    return (
      "<tr><td><strong>" +
      escapeHtml(doc.titulo) +
      '</strong><div class="text-muted" style="font-size:12px;">' +
      escapeHtml(doc.descripcion) +
      "</div></td>" +
      "<td><code>" +
      escapeHtml(doc.ruta) +
      "</code></td>" +
      "<td>" +
      escapeHtml(modificado) +
      '</td><td class="cell-actions text-muted" style="font-size:12px;">El contenido vive en tu carpeta local/Drive — este catálogo solo muestra metadatos.</td></tr>'
    );
  }

  function renderHeader() {
    const proyecto = state.proyecto || {};
    qs("#project-nombre").textContent = fmt(proyecto.nombre, "Proyecto sin nombre");
    // La ruta absoluta puede ser muy larga (rutas de Windows anidadas) — se
    // trunca visualmente con CSS (text-overflow: ellipsis) y queda completa
    // en el title (tooltip al pasar el ratón), en vez de forzar el ancho del
    // header o partirse en dos líneas.
    const ruta = fmt(proyecto.rutaAbsoluta, "");
    const rutaEl = qs("#project-ruta");
    rutaEl.textContent = ruta;
    rutaEl.title = ruta;
    qs("#project-generado-en").textContent = fmt(proyecto.generadoEn, "nunca");
    renderBadgeCambiosPendientes();
  }

  /**
   * Muestra cuántas ediciones hechas desde el dashboard aún no se han
   * procesado en una sesión de Claude (ver output-transversal/
   * cambios-pendientes-dashboard.md y prompts/transversal/actualizar-cascada.md).
   * No dispara ningún análisis por sí solo — es solo la señal para que una
   * futura sesión ("haz el análisis") sepa que hay algo que revisar sin
   * tener que re-escanear todo el proyecto.
   */
  function renderBadgeCambiosPendientes() {
    const badge = qs("#badge-cambios-pendientes");
    const count = (state.cambiosPendientes && state.cambiosPendientes.pendientesCount) || 0;
    if (count === 0) {
      badge.classList.add("hidden");
      return;
    }
    badge.classList.remove("hidden");
    badge.textContent = "🟠 " + count + (count === 1 ? " cambio pendiente de análisis" : " cambios pendientes de análisis");
  }

  // ------------------------------------------------------------------
  // TAB: Sprint actual
  // ------------------------------------------------------------------

  function getSprintActivo() {
    const sprints = (state.sprint && state.sprint.sprints) || [];
    return sprints.find((s) => s.activo) || null;
  }

  function renderSprintTab() {
    const sprintActivo = getSprintActivo();
    const sinDatos = qs("#sprint-sin-datos");
    const contenido = qs("#sprint-contenido");

    if (!sprintActivo) {
      sinDatos.classList.remove("hidden");
      contenido.classList.add("hidden");
      return;
    }
    sinDatos.classList.add("hidden");
    contenido.classList.remove("hidden");

    qs("#sprint-numero").textContent = sprintActivo.numero !== undefined ? "#" + sprintActivo.numero : "";
    qs("#sprint-objetivo").textContent = fmt(sprintActivo.objetivo, "Sin objetivo definido");
    qs("#sprint-fechas").textContent = fmt(sprintActivo.fechas, "");

    const disponible = extraerNumero(sprintActivo.capacidadDisponible);
    const ocupada = extraerNumero(sprintActivo.capacidadOcupada);
    qs("#sprint-cap-disponible").textContent = disponible ? disponible : "—";
    qs("#sprint-cap-ocupada").textContent = ocupada ? ocupada : "—";

    const pct = disponible > 0 ? Math.round((ocupada / disponible) * 100) : 0;
    const fill = qs("#sprint-progress-fill");
    fill.style.width = Math.min(pct, 100) + "%";
    fill.classList.toggle("over", pct > 100);
    qs("#sprint-progress-label").textContent =
      disponible > 0
        ? ocupada + " / " + disponible + " pts ocupados (" + pct + "%)"
        : "Sin capacidad disponible registrada";

    // Análisis Jira reciente
    const analisis = (state.sprint && state.sprint.analisisJira) || [];
    const jiraCard = qs("#sprint-jira-card");
    if (analisis.length > 0) {
      const ultimo = analisis[analisis.length - 1];
      jiraCard.classList.remove("hidden");
      const resumen = ultimo.resumenEjecutivo || ultimo.resumen || ultimo.texto || JSON.stringify(ultimo);
      qs("#sprint-jira-resumen").innerHTML =
        "<p>" + escapeHtml(typeof resumen === "string" ? resumen : JSON.stringify(resumen)) + "</p>";
    } else {
      jiraCard.classList.add("hidden");
    }

    const hus = sprintActivo.hu || [];
    renderSprintBurndownChart(sprintActivo);
    renderSprintEstadoChart(hus);
    renderSprintResumenLateral(hus);
    renderSprintHuPorEpica(hus);
  }

  /** "YYYY-MM-DD" | "YYYY-MM-DD ...texto..." -> Date a medianoche local, o null. */
  function parseFechaSimple(str) {
    if (!str) return null;
    const match = String(str).match(/(\d{4})-(\d{2})-(\d{2})/);
    if (!match) return null;
    return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
  }

  /** "YYYY-MM-DD" en huso horario LOCAL — nunca toISOString() aquí: convierte
   *  a UTC, y con timezones por delante de UTC (ej. Europa) desplaza la
   *  fecha un día hacia atrás (medianoche local cae en el día anterior en
   *  UTC), rompiendo el eje de fechas del burndown. */
  function formatFechaLocal(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + d;
  }

  function enumerarDiasSprint(inicioStr, finStr) {
    const inicio = parseFechaSimple(inicioStr);
    const fin = parseFechaSimple(finStr);
    if (!inicio || !fin || fin < inicio) return [];
    const dias = [];
    const cursor = new Date(inicio);
    while (cursor <= fin) {
      dias.push(formatFechaLocal(cursor));
      cursor.setDate(cursor.getDate() + 1);
    }
    return dias;
  }

  /**
   * Burndown real: línea ideal (interpolación lineal desde los puntos
   * comprometidos al inicio del sprint hasta 0 en la fecha fin) vs línea real
   * (campo "Puntos restantes del sprint" de cada daily log de este sprint,
   * ver prompts/paso-4/daily-log.md). Si no hay dailylogs con ese campo
   * todavía, la línea real queda vacía (no rota el gráfico) hasta que se
   * empiece a rellenar.
   */
  function renderSprintBurndownChart(sprintActivo) {
    const container = qs("#chart-sprint-burndown");
    const dias = enumerarDiasSprint(sprintActivo.fechaInicio, sprintActivo.fechaFin);
    const totalComprometido = extraerNumero(sprintActivo.capacidadOcupada);

    if (!dias.length || !totalComprometido) {
      container.innerHTML = emptyInline(
        "Sin fechas de sprint o capacidad ocupada suficientes para dibujar el burndown."
      );
      return;
    }
    if (!ECHARTS_AVAILABLE) {
      container.innerHTML = chartUnavailableMarkup();
      return;
    }

    const idealData = dias.map((_, idx) => {
      const frac = dias.length > 1 ? idx / (dias.length - 1) : 1;
      return Math.round(totalComprometido * (1 - frac) * 10) / 10;
    });

    const dailylogs = (state.gee && state.gee.dailylogs) || [];
    const numeroSprint = String(sprintActivo.numero !== undefined ? sprintActivo.numero : "");
    const puntosPorFecha = {};
    dailylogs.forEach((log) => {
      if (String(log.sprint || "").trim() === numeroSprint && log.puntosRestantes !== "" && log.puntosRestantes !== undefined) {
        const n = Number(log.puntosRestantes);
        if (!Number.isNaN(n)) puntosPorFecha[log.fecha] = n;
      }
    });
    const realData = dias.map((d) => (puntosPorFecha[d] !== undefined ? puntosPorFecha[d] : null));
    const hayDatosReales = realData.some((v) => v !== null);

    const chart = getOrCreateChart("chart-sprint-burndown");
    chart.setOption({
      tooltip: { trigger: "axis" },
      legend: { bottom: 0 },
      grid: { left: 48, right: 24, top: 24, bottom: 48 },
      xAxis: { type: "category", data: dias },
      yAxis: { type: "value", name: "Puntos restantes" },
      series: [
        {
          name: "Ideal",
          type: "line",
          data: idealData,
          lineStyle: { type: "dashed" },
          symbol: "none",
          color: "#9ca3af",
        },
        {
          name: "Real",
          type: "line",
          data: realData,
          connectNulls: true,
          color: "#2563eb",
        },
      ],
    });

    if (!hayDatosReales) {
      showToast(
        "El burndown solo tiene la línea ideal — todavía no hay ningún daily log de este sprint con \"Puntos restantes del sprint\" relleno.",
        "warn"
      );
    }
  }

  function renderSprintEstadoChart(hus) {
    const counts = { Pendiente: 0, "En curso": 0, Bloqueada: 0, Hecho: 0, Descartada: 0 };
    hus.forEach((hu) => {
      const estado = normalizeEstadoHu(hu.estado);
      if (counts[estado] === undefined) counts[estado] = 0;
      counts[estado]++;
    });

    const container = qs("#chart-sprint-estado");
    if (hus.length === 0) {
      container.innerHTML = emptyInline("No hay HU en el sprint activo todavía.");
      return;
    }
    if (!ECHARTS_AVAILABLE) {
      container.innerHTML = chartUnavailableMarkup();
      return;
    }
    const chart = getOrCreateChart("chart-sprint-estado");
    const data = Object.keys(counts)
      .filter((k) => counts[k] > 0)
      .map((k) => ({ name: k, value: counts[k] }));

    chart.setOption({
      tooltip: { trigger: "item" },
      legend: { bottom: 0 },
      color: ["#9ca3af", "#2563eb", "#dc2626", "#16a34a", "#d1d5db"],
      series: [
        {
          type: "pie",
          radius: ["45%", "70%"],
          data: data,
          label: { formatter: "{b}: {c}" },
        },
      ],
    });
  }

  function normalizeEstadoHu(raw) {
    if (!raw) return "Pendiente";
    const v = String(raw).toLowerCase();
    if (v.includes("descarta")) return "Descartada";
    if (v.includes("bloque")) return "Bloqueada";
    if (v.includes("curso") || v.includes("progreso") || v.includes("progress")) return "En curso";
    if (v.includes("hecho") || v.includes("done") || v.includes("completa")) return "Hecho";
    return "Pendiente";
  }

  const ESTADO_HU_BADGE_CLASS = {
    Pendiente: "badge-estado-gris",
    "En curso": "badge-estado-azul",
    Bloqueada: "badge-estado-rojo",
    Hecho: "badge-estado-verde",
    Descartada: "badge-estado-muted",
  };

  function estadoBadge(raw) {
    const norm = normalizeEstadoHu(raw);
    const clase = ESTADO_HU_BADGE_CLASS[norm] || "badge-estado-gris";
    return '<span class="badge-estado ' + clase + '">' + escapeHtml(norm) + "</span>";
  }

  function renderSprintResumenLateral(hus) {
    const total = hus.length;
    const bloqueadas = hus.filter((h) => normalizeEstadoHu(h.estado) === "Bloqueada").length;
    const hechas = hus.filter((h) => normalizeEstadoHu(h.estado) === "Hecho").length;
    const descartadas = hus.filter((h) => normalizeEstadoHu(h.estado) === "Descartada").length;
    const lockedCount = hus.filter((h) => h.locked).length;
    const container = qs("#sprint-resumen-lateral");
    if (total === 0) {
      container.innerHTML = emptyInline("Sin HU en el sprint.");
      return;
    }
    container.innerHTML =
      "<p><strong>" + total + "</strong> historias en total</p>" +
      "<p><strong>" + hechas + "</strong> completadas</p>" +
      "<p><strong>" + bloqueadas + "</strong> bloqueadas</p>" +
      (descartadas > 0 ? "<p><strong>" + descartadas + "</strong> descartadas</p>" : "") +
      (lockedCount > 0 ? "<p>🔒 <strong>" + lockedCount + "</strong> bloqueadas para edición (sprint activo)</p>" : "");
  }

  /** Agrupa las HU del sprint activo por épica, con un acordeón desplegable
   *  por épica y otro anidado por HU (mostrando sus subtareas técnicas). Las
   *  HU sin épica conocida (formato antiguo, o todavía no enlazadas) caen en
   *  un grupo "Sin épica asignada" en vez de desaparecer. */
  function renderSprintHuPorEpica(hus) {
    const container = qs("#sprint-hu-por-epica");
    if (!hus.length) {
      container.innerHTML = emptyInline("No hay historias de usuario en el sprint activo.");

    const grupos = {};
    const orden = [];
    hus.forEach((hu) => {

      if (!grupos[epica]) {

      grupos[epica].push(hu);

    container.innerHTML = orden
      .map((epica) => {

        return (
          '<details class="epica-group" open><summary>' +
          escapeHtml(epica) +
          ' <span class="text-muted">(' + items.length + (items.length === 1 ? " HU)" : " HU)") + "</span></summary>" +
          '<div class="epica-hu-list">' + husHtml + "</div></details>"

  function renderHuItemHtml(hu) {
    const subtareas = hu.subtareas || [];
    const subtareasHtml = subtareas.length

          .join("") +
        "</tbody></table>"
      : emptyInline("Sin subtareas técnicas registradas para esta HU.");

    return (
      '<details class="hu-item"><summary>' +
      '<span class="hu-id">' + escapeHtml(fmt(hu.hu)) + "</span> " +
      '<span class="hu-titulo">' + escapeHtml(fmt(hu.titulo)) + "</span> " +

      "</details>"
    );

  // "Sep 2026 — Oct 2026" (o variantes con "-", "–", "a", "hasta") -> mes+año
  // de inicio y de fin. Formato tal cual lo produce generar-roadmaps.md en
  // el campo "Ventana estimada" de cada hito.
  const MESES_ES = {
    ene: 0, enero: 0, feb: 1, febrero: 1, mar: 2, marzo: 2, abr: 3, abril: 3,
    may: 4, mayo: 4, jun: 5, junio: 5, jul: 6, julio: 6, ago: 7, agosto: 7,
    sep: 8, sept: 8, septiembre: 8, oct: 9, octubre: 9, nov: 10, noviembre: 10,
    dic: 11, diciembre: 11,
    // fallback en inglés, por si el contenido viene mixto
    jan: 0, january: 0, march: 2, april: 3, june: 5, july: 6, august: 7,
    september: 8, october: 9, november: 10, december: 11,
  };

  /** "Agosto 2026", "ago 2026"... -> { mes, ano }. Requiere año explícito. */
  function parseMesAno(fragmento) {
    const m = String(fragmento || "")
      .trim()
      .toLowerCase()
      .match(/([a-záéíóúñ]+)\.?\s+(\d{4})/i);
    if (!m) return null;
    const mes = MESES_ES[m[1]];
    if (mes === undefined) return null;
    return { mes, ano: Number(m[2]) };
  }

  /** "Agosto", "ago"... -> número de mes, SIN año (para el lado de un rango
   *  que comparte el año del otro lado, ver parseVentanaEstimada). */
  function parseSoloMes(fragmento) {
    const m = String(fragmento || "")
      .trim()
      .toLowerCase()
      .match(/^([a-záéíóúñ]+)\.?$/i);
    if (!m) return null;
    const mes = MESES_ES[m[1]];
    return mes === undefined ? null : mes;
  }

  /**
   * @returns {{inicio: Date, fin: Date}|null}
   *
   * Admite dos formatos, ambos usados en la práctica por generar-roadmaps.md:
   *  - "Jul 2026 — Ago 2026": cada lado trae su propio año.
   *  - "Julio-agosto 2026": un único año compartido, mencionado una sola vez
   *    junto al segundo mes — el primer lado es solo el nombre del mes, sin
   *    año propio, así que hay que tomarlo prestado del otro lado.
   */
  function parseVentanaEstimada(str) {
    if (!str) return null;
    const partes = String(str)
      .split(/\s*[—–-]\s*|\s+(?:a|hasta)\s+/i)
      .filter(Boolean);
    if (partes.length === 0) return null;

    if (partes.length === 1) {
      const unico = parseMesAno(partes[0]);
      if (!unico) return null;
      return { inicio: new Date(unico.ano, unico.mes, 1), fin: new Date(unico.ano, unico.mes + 1, 0) };
    }

    let inicio = parseMesAno(partes[0]);
    let fin = parseMesAno(partes[1]);

    if (!inicio && fin) {
      const soloMes = parseSoloMes(partes[0]);
      if (soloMes !== null) inicio = { mes: soloMes, ano: fin.ano };
    }
    if (!fin && inicio) {
      const soloMes = parseSoloMes(partes[1]);
      if (soloMes !== null) fin = { mes: soloMes, ano: inicio.ano };
    }
    if (!inicio) return null;
    if (!fin) fin = inicio;

    const fechaInicio = new Date(inicio.ano, inicio.mes, 1);
    // Día 0 del mes siguiente = último día del mes de fin.
    const fechaFin = new Date(fin.ano, fin.mes + 1, 0);
    return { inicio: fechaInicio, fin: fechaFin };
  }

  function confianzaKey(raw) {
    const v = String(raw || "").toLowerCase();
    if (v.includes("✅") || v.includes("alta")) return "alta";
    if (v.includes("⚠") || v.includes("media") || v.includes("riesgo medio")) return "media";
    if (v.includes("🔥") || v.includes("baja") || v.includes("alto riesgo")) return "baja";
    return "desconocida";
  }

  const COLOR_CONFIANZA = { alta: "#16a34a", media: "#ca8a04", baja: "#dc2626", desconocida: "#9ca3af" };

  /**
   * Cronograma horizontal de hitos (tipo el timeline de épicas de Jira):
   * cada hito es una barra que va de su mes de inicio a su mes de fin,
   * coloreada por nivel de confianza. Se apoya en la convención de
   * "Ventana estimada" ("Mes AAAA — Mes AAAA") que ya produce
   * generar-roadmaps.md — un hito cuya ventana no se pueda interpretar como
   * fecha simplemente no aparece en el gráfico (pero sí en el detalle de
   * abajo, ver renderRoadmapClienteDetalle).
   */
  function renderRoadmapClienteChart() {
    const container = qs("#chart-roadmap-cliente");
    const roadmapCliente = state.roadmap && state.roadmap.roadmapCliente;
    if (!roadmapCliente) {
      container.innerHTML = emptyState("📅", "Todavía no se ha generado el roadmap de cliente.", "Se generará en el paso 2 del proceso (generar-roadmaps).");
      return;
    }
    const hitos = roadmapCliente.hitos || roadmapCliente.milestones || [];
    const parseados = hitos.map((h) => ({ hito: h, rango: parseVentanaEstimada(h.ventanaEstimada || h.fecha) })).filter((x) => x.rango);

    if (parseados.length === 0) {
      container.innerHTML = emptyInline(
        hitos.length === 0
          ? "El roadmap de cliente existe pero no tiene hitos definidos todavía."
          : 'No se ha podido interpretar la "Ventana estimada" de ningún hito como fecha (formato esperado: "Mes AAAA — Mes AAAA"). Ver el detalle más abajo.'
      );
      return;
    }
    if (!ECHARTS_AVAILABLE) {
      container.innerHTML = chartUnavailableMarkup();
      return;
    }

    // Hito 1 arriba: en el eje de categorías de ECharts el primer elemento
    // del array queda abajo salvo que se invierta el orden aquí.
    const ordenados = parseados.slice().reverse();

    const msPorDia = 24 * 60 * 60 * 1000;
    const inicioEpoca = ordenados.reduce((min, x) => (x.rango.inicio < min ? x.rango.inicio : min), ordenados[0].rango.inicio);
    const diasDesdeEpoca = (fecha) => Math.round((fecha - inicioEpoca) / msPorDia);

    const categorias = ordenados.map((x) => x.hito.nombre || x.hito.titulo || "Hito " + (x.hito.numero || ""));
    const offsets = ordenados.map((x) => diasDesdeEpoca(x.rango.inicio));
    const duraciones = ordenados.map((x) => Math.max(1, diasDesdeEpoca(x.rango.fin) - diasDesdeEpoca(x.rango.inicio)));
    const colores = ordenados.map((x) => COLOR_CONFIANZA[confianzaKey(x.hito.confianza)]);

    const chart = getOrCreateChart("chart-roadmap-cliente");
    chart.setOption({
      tooltip: {
        trigger: "item",
        formatter: (params) => {
          const x = ordenados[params.dataIndex];
          if (!x) return "";
          return (
            "<strong>" + escapeHtml(fmt(x.hito.nombre || x.hito.titulo, "")) + "</strong><br/>" +
            escapeHtml(fmt(x.hito.ventanaEstimada || x.hito.fecha, "")) +
            (x.hito.queIncluye ? "<br/>" + escapeHtml(x.hito.queIncluye) : "") +
            (x.hito.confianza ? "<br/>" + escapeHtml(x.hito.confianza) : "")
          );
        },
      },
      grid: { left: 160, right: 20, top: 20, bottom: 30 },
      xAxis: {
        type: "value",
        min: 0,
        axisLabel: {
          formatter: (valorDias) => {
            const fecha = new Date(inicioEpoca.getTime() + valorDias * msPorDia);
            return fecha.toLocaleDateString("es-ES", { month: "short", year: "numeric" });
          },
        },
      },
      yAxis: { type: "category", data: categorias },
      series: [
        {
          name: "Offset",
          type: "bar",
          stack: "total",
          itemStyle: { color: "transparent" },
          silent: true,
          tooltip: { show: false },
          data: offsets,
        },
        {
          name: "Duración",
          type: "bar",
          stack: "total",
          barWidth: "50%",
          data: duraciones.map((d, i) => ({ value: d, itemStyle: { color: colores[i] } })),
        },
      ],
    });
  }

  function renderRoadmapClienteDetalle() {
    const container = qs("#roadmap-cliente-detalle");
    const roadmapCliente = state.roadmap && state.roadmap.roadmapCliente;

  function confianzaEmoji(raw) {
    if (!raw) return "❔";
    const v = String(raw).toLowerCase();
    if (v.includes("✅") || v.includes("alta") || v.includes("high")) return "✅";
    if (v.includes("⚠") || v.includes("media") || v.includes("medium")) return "⚠️";
    if (v.includes("🔥") || v.includes("baja") || v.includes("low") || v.includes("riesgo")) return "🔥";
    // Si ya viene el emoji tal cual en el campo, se devuelve tal cual.
    if (raw === "✅" || raw === "⚠️" || raw === "🔥") return raw;
    return "❔";
  }

  /** Da formato legible a un valor de capacidad que puede ser texto plano,
   *  un objeto clave-valor (ej. composicionTecnica) o un array de fichas
   *  (ej. miembros, disponibilidad). Nunca deja que un objeto/array llegue
   *  a concatenarse directo en un template string (produce "[object Object]"). */
  function formatearValorCapacidad(value) {
    if (value === null || value === undefined || value === "") return null;
    if (Array.isArray(value)) {
      if (value.length === 0) return null;
      if (typeof value[0] === "object") {
        return value
          .map((item) =>
            Object.keys(item)
              .filter((k) => item[k])
              .map((k) => humanizeKey(k) + ": " + escapeHtml(fmt(item[k])))
              .join(" · ")
          )
          .map((line) => "<div>" + line + "</div>")
          .join("");
      }
      return escapeHtml(value.join(", "));
    }
    if (typeof value === "object") {
      const keys = Object.keys(value).filter((k) => value[k]);
      if (keys.length === 0) return null;
      return keys.map((k) => humanizeKey(k) + ": " + escapeHtml(fmt(value[k]))).join(", ");
    }
    return escapeHtml(fmt(value));
  }

  function renderCapacidadActual() {
    const container = qs("#capacidad-actual-contenido");
    const cap = state.roadmap && state.roadmap.capacidadActual;
    if (!cap) {
      container.innerHTML = emptyState("⚙️", "Todavía no se ha calculado la capacidad del equipo.", "Se genera en el paso 2 (cuestionario/procesar-capacidad).");
      return;
    }
    // "raw" es el texto original sin procesar, guardado por el backend solo
    // como respaldo de depuración — no es apto para mostrarse en el dashboard.
    const entries = Object.keys(cap).filter((k) => k !== "raw" && cap[k] !== null && cap[k] !== undefined);
    const bloques = entries
      .map((k) => ({ key: k, html: formatearValorCapacidad(cap[k]) }))
      .filter((e) => e.html !== null);
    if (bloques.length === 0) {
      container.innerHTML = emptyInline("Capacidad registrada pero sin campos con datos.");
      return;
    }
    container.innerHTML =
      '<div class="grid-3">' +
      bloques
        .map(
          (e) =>
            '<div class="stat-block"><div class="stat-label">' +
            escapeHtml(humanizeKey(e.key)) +
            '</div><div class="stat-value" style="font-size:14px; font-weight:400;">' +
            e.html +
            "</div></div>"
        )
        .join("") +
      "</div>";
  }

  function humanizeKey(key) {
    return key
      .replace(/([a-z])([A-Z])/g, "$1 $2")
      .replace(/^./, (c) => c.toUpperCase());
  }

  // ------------------------------------------------------------------
  // Charts helpers
  // ------------------------------------------------------------------

  function chartUnavailableMarkup() {
    return (
      '<div class="chart-unavailable">Ejecuta <code>npm run setup</code> para habilitar los gráficos (falta vendor/echarts.min.js).</div>'
    );
  }

  function getOrCreateChart(containerId) {
    const container = qs("#" + containerId);
    // Aseguramos que el contenedor no tenga el markup de "no disponible" de un render previo.
    if (!container.querySelector("canvas") && container.getAttribute("_echarts_instance_")) {
      // ya inicializado por echarts, nada que hacer
    }
    if (chartInstances[containerId]) {
      return chartInstances[containerId];
    }
    container.innerHTML = "";
    const chart = echarts.init(container);
    chartInstances[containerId] = chart;
    return chart;
  }

  function resizeAllCharts() {
    Object.keys(chartInstances).forEach((id) => {
      try {
        chartInstances[id].resize();
      } catch (e) {
        /* noop */
      }
    });
  }

  /**
   * Definición de columnas por tipo GEE. Cada columna: { key, label, type, editable }
   * type: "text" | "textarea" | "select" | "date" | "number"
   * Estos campos se basan estrictamente en el contrato de /api/data dado.
   */
  const GEE_CONFIG = {
    riesgos: {
      apiTipo: "riesgos",
      dataKey: "riesgos",
      tablaWrap: "riesgos-tabla-wrap",
      formId: "form-nuevo-riesgo",
      titulo: "riesgo",
      resumenKeys: ["riesgo", "rag"],
      columns: [
        { key: "id", label: "ID", editable: false },
        { key: "fechaAlta", label: "Fecha alta", type: "date" },
        { key: "riesgo", label: "Riesgo", type: "textarea" },

  /** Busca la config declarativa (GEE o Requisitos) de un tipo por su clave. */
  function getRegistryConfig(tipo) {
    return GEE_CONFIG[tipo] || REQUISITOS_CONFIG[tipo];
  }

  function renderGeeAll() {
    renderRiesgosRagChart();
    Object.keys(GEE_CONFIG).forEach((tipo) => renderGeeTable(tipo));
    renderDailyLog();

  }

  function renderRiesgosRagChart() {
    const container = qs("#chart-riesgos-rag");
    const counts = (state.metricas && state.metricas.riesgosPorRag) || null;
    if (!counts) {
      container.innerHTML = emptyInline("Sin datos de riesgos por RAG todavía.");
      return;
    }
    const total = (counts.verde || 0) + (counts.amarillo || 0) + (counts.rojo || 0);
    if (total === 0) {
      container.innerHTML = emptyInline("No hay riesgos registrados todavía.");
      return;
    }
    if (!ECHARTS_AVAILABLE) {
      container.innerHTML = chartUnavailableMarkup();
      return;
    }
    const chart = getOrCreateChart("chart-riesgos-rag");
    chart.setOption({
      tooltip: { trigger: "axis" },
      grid: { left: 40, right: 20, top: 20, bottom: 30 },
      xAxis: { type: "category", data: ["Verde", "Amarillo", "Rojo"] },
      yAxis: { type: "value" },
      series: [
        {
          type: "bar",
          data: [
            { value: counts.verde || 0, itemStyle: { color: "#16a34a" } },
            { value: counts.amarillo || 0, itemStyle: { color: "#ca8a04" } },
            { value: counts.rojo || 0, itemStyle: { color: "#dc2626" } },
          ],
          barWidth: "50%",
        },
      ],
    });
