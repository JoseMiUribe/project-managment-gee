  // ---------- Render genérico de tabla editable GEE ----------

  // ---------- Tabla compacta + panel de detalle desplegable ----------
  //
  // Antes cada fila mostraba TODAS las columnas (hasta ~20 en Riesgos) en una
  // única fila ancha, con el botón "Editar" al final — en la práctica quedaba
  // fuera de la vista sin hacer scroll horizontal, y el scroll horizontal en
  // tablas es poco usable. Ahora cada registro es una fila resumen (2-3
  // columnas clave) + una fila de detalle desplegable con todos los campos en
  // formato vertical (etiqueta encima del valor), donde vive también el botón
  // de edición — más fácil de encontrar, y con sitio de sobra para selects,
  // selector de fecha y desplegables relacionales.

  function renderGeeTable(tipo) {
    const cfg = getRegistryConfig(tipo);
    const wrap = qs("#" + cfg.tablaWrap);
    const rawRows = cfg.getRows ? cfg.getRows() : (state.gee && state.gee[cfg.dataKey]) || [];
    // "Eliminado" nunca se ve en el dashboard (aunque sigue en el archivo,
    // nunca se borra de verdad) — "Descartado" sí se ve, tachado, ver
    // buildGeeRowPair. No aplica a tipos con softDelete:false (Requisitos):
    // esas filas nunca tienen "visibilidad", así que el filtro es un no-op.
    const rows = rawRows.filter((r) => r.visibilidad !== "Eliminado");

    if (!rows || rows.length === 0) {
      wrap.innerHTML = emptyState("📭", "Todavía no hay ningún registro de " + cfg.titulo + ".", 'Usa el botón "+ Nuevo ' + cfg.titulo + '" para crear el primero.');
      ensureNewRecordForm(tipo);
      return;
    }

    const resumenCols = cfg.columns.filter((c) => (cfg.resumenKeys || []).includes(c.key));

    const table = el("table", { class: "data-table data-table-compact" });
    const thead = el("thead");
    const headRow = el("tr");
    headRow.appendChild(el("th", { text: "ID" }));
    resumenCols.forEach((col) => headRow.appendChild(el("th", { text: col.label })));
    headRow.appendChild(el("th", { text: "" }));
    thead.appendChild(headRow);
    table.appendChild(thead);

    const tbody = el("tbody");
    rows.forEach((row) => {
      const { summaryTr, detailTr } = buildGeeRowPair(tipo, cfg, row, resumenCols);
      tbody.appendChild(summaryTr);
      tbody.appendChild(detailTr);
    });
    table.appendChild(tbody);

    wrap.innerHTML = "";
    wrap.appendChild(table);

    ensureNewRecordForm(tipo);
  }

  function buildGeeRowPair(tipo, cfg, row, resumenCols) {
    const colspan = resumenCols.length + 2;
    const softDelete = cfg.softDelete !== false;
    const descartado = softDelete && row.visibilidad === "Descartado";

    const summaryTr = el("tr", {
      "data-id": String(row.id),
      class: "gee-row-summary" + (descartado ? " gee-row-descartada" : ""),
    });
    summaryTr.appendChild(el("td", { text: fmt(row.id) }));
    resumenCols.forEach((col) => {
      const td = el("td");
      renderCellReadonly(td, col, row);
      summaryTr.appendChild(td);
    });
    const tdToggle = el("td", { class: "cell-actions" });
    if (descartado) tdToggle.appendChild(el("span", { class: "badge-descartado", text: "Descartado" }));
    const btnToggle = el("button", { class: "btn btn-sm", text: "Ver detalle" });
    tdToggle.appendChild(btnToggle);
    summaryTr.appendChild(tdToggle);

    const detailTr = el("tr", { class: "gee-row-detail hidden" });
    const detailTd = el("td", { colspan: String(colspan) });
    const panel = el("div", { class: "detail-panel" });

    if (descartado) {
      const banner = el("div", { class: "descarte-banner form-field-wide" });
      banner.appendChild(el("strong", { text: "Descartado" }));
      banner.appendChild(document.createTextNode(" — " + fmt(row.motivoDescarte, "sin motivo registrado")));
      panel.appendChild(banner);
    }

    const btnEdit = el("button", { class: "btn btn-sm", text: "Editar" });
    const btnSave = el("button", { class: "btn btn-sm btn-primary hidden", text: "Guardar cambios" });
    const btnCancel = el("button", { class: "btn btn-sm hidden", text: "Cancelar" });
    const btnDescartar = el("button", { class: "btn btn-sm", text: "Descartar" });
    const btnEliminar = el("button", { class: "btn btn-sm btn-danger-text", text: "Eliminar" });
    const btnReactivar = el("button", { class: "btn btn-sm btn-primary", text: "Reactivar" });

    cfg.columns.forEach((col) => {
      if (col.key === "id") return; // ya se muestra en la fila resumen
      const field = el("div", { class: "detail-field", "data-key": col.key });
      field.appendChild(el("label", { text: col.label }));
      const valueEl = el("div", { class: "detail-value" });
      renderCellReadonly(valueEl, col, row);
      field.appendChild(valueEl);
      panel.appendChild(field);
    });

    const actions = el("div", { class: "detail-actions" });
    if (descartado) {
      // Un registro descartado no se edita "en caliente" — primero se
      // reactiva (vuelve a Activo) y luego se edita con normalidad.
      actions.appendChild(btnReactivar);
    } else {
      actions.appendChild(btnEdit);
      actions.appendChild(btnSave);
      actions.appendChild(btnCancel);
      if (softDelete) {
        actions.appendChild(btnDescartar);
        actions.appendChild(btnEliminar);
      }
    }
    panel.appendChild(actions);

    detailTd.appendChild(panel);
    detailTr.appendChild(detailTd);

    btnToggle.addEventListener("click", () => {
      const estabaOculto = detailTr.classList.contains("hidden");
      detailTr.classList.toggle("hidden");
      btnToggle.textContent = estabaOculto ? "Ocultar detalle" : "Ver detalle";
    });

    if (descartado) {
      btnReactivar.addEventListener("click", () => reactivarRegistro(tipo, cfg, row));
    } else {
      btnEdit.addEventListener("click", () => {
        enterEditMode(panel, cfg, row, btnEdit, btnSave, btnCancel);
        btnDescartar.classList.add("hidden");
        btnEliminar.classList.add("hidden");
      });
      btnCancel.addEventListener("click", () => {
        exitEditMode(panel, cfg, row, btnEdit, btnSave, btnCancel);
        btnDescartar.classList.remove("hidden");
        btnEliminar.classList.remove("hidden");
      });
      btnSave.addEventListener("click", () => saveRowEdits(tipo, cfg, row, panel, btnEdit, btnSave, btnCancel));
      btnDescartar.addEventListener("click", () => abrirMotivoForm(tipo, cfg, row, panel, actions, "Descartado"));
      btnEliminar.addEventListener("click", () => abrirMotivoForm(tipo, cfg, row, panel, actions, "Eliminado"));
    }

    return { summaryTr, detailTr };
  }

  // ---------- Descartar / Eliminar (nunca borrado real del archivo) ----------
  //
  // "Descartar" marca el registro como tachado pero sigue visible en el
  // dashboard (para que quede constancia a simple vista de que se descartó).
  // "Eliminar" lo oculta del dashboard por completo, pero la fila sigue
  // físicamente en el archivo — este skill nunca borra datos de verdad (ver
  // el 405 explícito en server.js para cualquier DELETE). Ambas acciones
  // exigen un motivo, y ambas usan el mismo endpoint PUT genérico que ya
  // existe para editar cualquier campo del GEE.

  function abrirMotivoForm(tipo, cfg, row, panel, actionsContainer, accion) {
    const existente = panel.querySelector(".motivo-inline-form");
    if (existente) {
      existente.remove();
      return;
    }

    const esDescarte = accion === "Descartado";
    const form = el("div", { class: "motivo-inline-form form-field-wide" });
    form.appendChild(el("label", { text: esDescarte ? "Motivo del descarte" : "Motivo de la eliminación" }));
    const textarea = el("textarea", { rows: "2" });
    form.appendChild(textarea);

    const formActions = el("div", { class: "form-actions" });
    const btnConfirmar = el("button", {
      class: "btn btn-sm btn-primary",
      text: esDescarte ? "Confirmar descarte" : "Confirmar eliminación",
    });
    const btnCancelarMotivo = el("button", { class: "btn btn-sm", text: "Cancelar" });
    formActions.appendChild(btnConfirmar);
    formActions.appendChild(btnCancelarMotivo);
    form.appendChild(formActions);

    btnCancelarMotivo.addEventListener("click", () => form.remove());
    btnConfirmar.addEventListener("click", async () => {
      const motivo = textarea.value.trim();
      if (!motivo) {
        showToast("Escribe un motivo antes de confirmar.", "error");
        return;
      }
      setBtnLoading(btnConfirmar, true, "Guardando…");
      try {
        state = await apiSend("PUT", "/api/gee/" + cfg.apiTipo + "/" + encodeURIComponent(row.id), {
          confirm: true,
          visibilidad: accion,
          motivoDescarte: motivo,
        });
        renderAll();
        showToast((esDescarte ? "Registro descartado: " : "Registro eliminado del dashboard: ") + row.id, "success");
      } catch (err) {
        console.error(err);
        showToast("No se pudo aplicar el cambio: " + err.message, "error");
        setBtnLoading(btnConfirmar, false);
      }
    });

    panel.insertBefore(form, actionsContainer);
  }

  async function reactivarRegistro(tipo, cfg, row) {
    const confirmed = window.confirm("¿Confirmas reactivar este " + cfg.titulo + " (" + row.id + ")? Volverá a aparecer como activo.");
    if (!confirmed) return;
    try {
      state = await apiSend("PUT", "/api/gee/" + cfg.apiTipo + "/" + encodeURIComponent(row.id), {
        confirm: true,
        visibilidad: "",
        motivoDescarte: "",
      });
      renderAll();
      showToast("Registro reactivado: " + row.id, "success");
    } catch (err) {
      console.error(err);
      showToast("No se pudo reactivar: " + err.message, "error");
    }
  }

  function renderCellReadonly(el_, col, row) {
    const value = row[col.key];
    if (col.render) {
      el_.innerHTML = col.render(value, row);
    } else {
      el_.textContent = fmt(value, "—");
    }
  }

  /** "2026-07-06" o similar -> "YYYY-MM-DD" exacto que exige <input type="date">.
   *  Vacío si no hay nada parseable (el input simplemente queda sin valor,
   *  no rompe nada). */
  function normalizarFechaParaInput(value) {
    const match = String(value || "").match(/(\d{4})-(\d{2})-(\d{2})/);
    return match ? match[0] : "";
  }

  function enterEditMode(panel, cfg, row, btnEdit, btnSave, btnCancel) {
    cfg.columns.forEach((col) => {
      if (col.key === "id" || col.editable === false) return; // permanece readonly (ID, fechaUpdate, etc.)
      const field = panel.querySelector('.detail-field[data-key="' + col.key + '"]');
      if (!field) return;
      const valueEl = field.querySelector(".detail-value");
      const currentValue = row[col.key] || "";

      if (col.type === "relacion") {
        valueEl.innerHTML = "";
        valueEl.appendChild(buildRelacionPicker(col, currentValue));
        return;
      }

      let input;
      if (col.type === "textarea") {
        input = el("textarea");
        input.value = currentValue;
      } else if (col.type === "select") {
        input = el("select");
        // El valor guardado puede venir con emoji/prefijo (ej. "🟡 Amarillo")
        // mientras las opciones del <select> son texto plano ("Amarillo") —
        // comparamos por inclusión, no por igualdad exacta, para no perder
        // la selección real y sobrescribir sin querer con la primera opción.
        (col.options || []).forEach((opt) => {
          const optionEl = el("option", { value: opt, text: opt });
          if (opcionCoincideConValor(opt, currentValue)) optionEl.selected = true;
          input.appendChild(optionEl);
        });
      } else if (col.type === "date") {
        input = el("input", { type: "date" });
        input.value = normalizarFechaParaInput(currentValue);
      } else {
        input = el("input", { type: "text" });
        input.value = currentValue;
      }
      input.dataset.fieldKey = col.key;
      valueEl.innerHTML = "";
      valueEl.appendChild(input);
    });
    btnEdit.classList.add("hidden");
    btnSave.classList.remove("hidden");
    btnCancel.classList.remove("hidden");
  }

  function exitEditMode(panel, cfg, row, btnEdit, btnSave, btnCancel) {
    cfg.columns.forEach((col) => {
      if (col.key === "id") return;
      const field = panel.querySelector('.detail-field[data-key="' + col.key + '"]');
      if (!field) return;
      const valueEl = field.querySelector(".detail-value");
      renderCellReadonly(valueEl, col, row);
    });
    btnEdit.classList.remove("hidden");
    btnSave.classList.add("hidden");
    btnCancel.classList.add("hidden");
  }

  async function saveRowEdits(tipo, cfg, row, panel, btnEdit, btnSave, btnCancel) {
    const updates = {};
    cfg.columns.forEach((col) => {
      if (col.editable === false) return;
      if (col.type === "relacion") {
        const field = panel.querySelector('.detail-field[data-key="' + col.key + '"]');
        if (field) updates[col.key] = collectRelacionValue(field);
        return;
      }
      const input = panel.querySelector('[data-field-key="' + col.key + '"]');
      if (input) updates[col.key] = input.value;
    });

    const confirmed = window.confirm("¿Confirmas este cambio en " + cfg.titulo + " " + row.id + "?");
    if (!confirmed) return;

    setBtnLoading(btnSave, true, "Guardando…");
    try {
      const payload = Object.assign({ confirm: true }, updates);
      state = await apiSend("PUT", "/api/gee/" + cfg.apiTipo + "/" + encodeURIComponent(row.id), payload);
      renderAll();
      showToast("Cambio guardado en " + cfg.titulo + " " + row.id + ".", "success");
    } catch (err) {
      console.error(err);
      showToast("No se pudo guardar: " + err.message, "error");
      setBtnLoading(btnSave, false);
    }
  }

  // ---------- Desplegables relacionales (0..n IDs de otros tipos de GEE) ----------
  //
  // Sustituye los campos de texto libre para IDs cruzados (ej. "Riesgos
  // asociados" de una dependencia) por una lista de checkboxes con los
  // registros reales ya existentes — no se puede escribir un ID que no
  // exista ni desalinear el formato de separación por comas.

  function parseRelacionValue(value) {
    return String(value || "")
      .split(",")
      .map((s) => s.trim())
      .filter((s) => s && s !== "—");
  }

  function datosGeeDeTipo(tipo) {
    const cfg = GEE_CONFIG[tipo];
    return (state.gee && state.gee[cfg.dataKey]) || [];
  }

  /** Texto corto para mostrar junto al ID en el desplegable relacional (usa
   *  la primera columna "de resumen" de ese tipo como descripción). */
  function resumenTextoDeFila(tipoRel, row) {
    const cfg = GEE_CONFIG[tipoRel];
    const key = (cfg.resumenKeys || [])[0];
    const texto = key ? fmt(row[key], "") : "";
    return texto ? texto.slice(0, 60) : "";
  }

  function buildRelacionPicker(col, currentValue) {
    const seleccionados = new Set(parseRelacionValue(currentValue));
    const container = el("div", { class: "rel-picker" });

    (col.relTipos || []).forEach((tipoRel) => {
      const cfgRel = GEE_CONFIG[tipoRel];
      const datos = datosGeeDeTipo(tipoRel);
      const grupo = el("div", { class: "rel-picker-grupo" });
      if (col.relTipos.length > 1) {
        grupo.appendChild(el("div", { class: "rel-picker-grupo-titulo", text: cfgRel.titulo }));
      }
      if (datos.length === 0) {
        grupo.appendChild(el("div", { class: "text-muted", text: "Sin registros de " + cfgRel.titulo + " todavía." }));
      }
      datos.forEach((row) => {
        const item = el("label", { class: "rel-picker-item" });
        const checkbox = el("input", { type: "checkbox", value: row.id });
        if (seleccionados.has(String(row.id))) checkbox.checked = true;
        item.appendChild(checkbox);
        const desc = resumenTextoDeFila(tipoRel, row);
        item.appendChild(document.createTextNode(" " + row.id + (desc ? " — " + desc : "")));
        grupo.appendChild(item);
      });
      if (col.relCreable) {
        const btnAdd = el("button", { class: "btn btn-sm rel-picker-add", text: "+ Nuevo " + cfgRel.titulo });
        btnAdd.addEventListener("click", () => abrirCreacionInlineRelacion(tipoRel, grupo));
        grupo.appendChild(btnAdd);
      }
      container.appendChild(grupo);
    });

    return container;
  }

  function collectRelacionValue(field) {
    const checked = qsa('input[type="checkbox"]:checked', field);
    if (checked.length === 0) return "—";
    return checked.map((c) => c.value).join(", ");
  }

  /** "+ Nuevo <tipo>" dentro de un desplegable relacional (hoy solo en
   *  Cambios de alcance, ver relCreable): abre un mini-formulario con los
   *  campos de ese tipo, lo crea vía la misma API que su pestaña, y añade el
   *  ID recién creado ya marcado en este mismo picker — sin recargar toda la
   *  tabla de Cambios de alcance (perdería el panel de edición abierto). */
  function abrirCreacionInlineRelacion(tipoRel, grupo) {
    const existente = grupo.querySelector(".rel-picker-inline-form");
    if (existente) {
      existente.remove();
      return;
    }

    const cfgRel = GEE_CONFIG[tipoRel];
    const form = el("div", { class: "rel-picker-inline-form" });
    const editableCols = cfgRel.columns.filter((c) => c.editable !== false && c.type !== "relacion");
    const inputs = [];

    editableCols.forEach((col) => {
      const field = el("div", { class: "form-field" });
      field.appendChild(el("label", { text: col.label }));
      let input;
      if (col.type === "textarea") {
        input = el("textarea");
      } else if (col.type === "select") {
        input = el("select");
        input.appendChild(el("option", { value: "", text: "—" }));
        (col.options || []).forEach((opt) => input.appendChild(el("option", { value: opt, text: opt })));
      } else if (col.type === "date") {
        input = el("input", { type: "date" });
      } else {
        input = el("input", { type: "text" });
      }
      input.dataset.fieldKey = col.key;
      field.appendChild(input);
      form.appendChild(field);
      inputs.push(input);
    });

    const btnCrear = el("button", { class: "btn btn-sm btn-primary", text: "Crear y asociar" });
    const btnCancelarInline = el("button", { class: "btn btn-sm", text: "Cancelar" });
    const actions = el("div", { class: "form-actions" });
    actions.appendChild(btnCrear);
    actions.appendChild(btnCancelarInline);
    form.appendChild(actions);

    btnCancelarInline.addEventListener("click", () => form.remove());
    btnCrear.addEventListener("click", async () => {
      const payload = { confirm: true };
      inputs.forEach((input) => {
        payload[input.dataset.fieldKey] = input.value;
      });
      setBtnLoading(btnCrear, true, "Creando…");
      try {
        const resp = await apiSend("POST", "/api/gee/" + cfgRel.apiTipo, payload);
        state = resp.snapshot || state;
        const createdId = resp.createdId;
        // Refresca las demás pestañas GEE con el nuevo dato, pero no la que
        // se está editando ahora mismo (perdería el panel abierto).
        Object.keys(GEE_CONFIG).forEach((t) => {
          if (t !== "changelog") renderGeeTable(t);
        });
        const item = el("label", { class: "rel-picker-item" });
        const checkbox = el("input", { type: "checkbox", value: createdId });
        checkbox.checked = true;
        item.appendChild(checkbox);
        item.appendChild(document.createTextNode(" " + createdId + " (recién creado)"));
        grupo.insertBefore(item, form);
        form.remove();
        showToast("Nuevo " + cfgRel.titulo + " (" + createdId + ") creado y asociado.", "success");
      } catch (err) {
        console.error(err);
        showToast("No se pudo crear: " + err.message, "error");
      } finally {
        setBtnLoading(btnCrear, false);
      }
    });

    grupo.appendChild(form);
  }

  // ---------- Formulario "+ Nuevo registro" ----------

  function ensureNewRecordForm(tipo) {
    const cfg = getRegistryConfig(tipo);
    const container = qs("#" + cfg.formId);
    if (container.dataset.built === "true") return;
    container.dataset.built = "true";

    const grid = el("div", { class: "form-grid" });
    const editableCols = cfg.columns.filter((c) => c.editable !== false);
    editableCols.forEach((col) => {
      const esAncho = col.type === "textarea" || col.type === "relacion";
      const field = el("div", { class: "form-field" + (esAncho ? " form-field-wide" : "") });
      field.appendChild(el("label", { text: col.label }));

      if (col.type === "relacion") {
        const picker = buildRelacionPicker(col, "");
        picker.dataset.fieldKeyRelacion = col.key;
        field.appendChild(picker);
        grid.appendChild(field);
        return;
      }

      let input;
      if (col.type === "textarea") {
        input = el("textarea");
      } else if (col.type === "select") {
        input = el("select");
        input.appendChild(el("option", { value: "", text: "—" }));
        (col.options || []).forEach((opt) => input.appendChild(el("option", { value: opt, text: opt })));
      } else if (col.type === "date") {
        input = el("input", { type: "date" });
      } else {
        input = el("input", { type: "text" });
      }
      input.dataset.fieldKey = col.key;
      field.appendChild(input);
      grid.appendChild(field);
    });
    container.appendChild(grid);

    const actions = el("div", { class: "form-actions" });
    const btnCreate = el("button", { class: "btn btn-primary btn-sm", text: "Crear " + cfg.titulo });
    const btnCancel = el("button", { class: "btn btn-sm", text: "Cancelar" });
    btnCreate.addEventListener("click", () => createNewRecord(tipo, cfg, container, btnCreate));
    btnCancel.addEventListener("click", () => container.classList.remove("open"));
    actions.appendChild(btnCreate);
    actions.appendChild(btnCancel);
    container.appendChild(actions);
  }

  async function createNewRecord(tipo, cfg, container, btnCreate) {
    const inputs = qsa("[data-field-key]", container);
    const payload = { confirm: true };
    inputs.forEach((input) => {
      payload[input.dataset.fieldKey] = input.value;
    });
    qsa("[data-field-key-relacion]", container).forEach((picker) => {
      payload[picker.dataset.fieldKeyRelacion] = collectRelacionValue(picker);
    });

    const confirmed = window.confirm("¿Confirmas la creación de este nuevo " + cfg.titulo + "?");
    if (!confirmed) return;

    setBtnLoading(btnCreate, true, "Creando…");
    try {
      // OJO: este endpoint (POST) devuelve { createdId, snapshot } — a
      // diferencia de PUT, que devuelve el snapshot directamente. Asignar la
      // respuesta entera a "state" (como hacía la versión anterior) dejaba
      // el dashboard entero en blanco tras crear cualquier registro nuevo.
      const resp = await apiSend("POST", "/api/gee/" + cfg.apiTipo, payload);
      state = resp.snapshot;
      renderAll();
      showToast("Nuevo " + cfg.titulo + " creado.", "success");
      container.classList.remove("open");
      inputs.forEach((input) => {
        input.value = "";
      });
    } catch (err) {
      console.error(err);
      showToast("No se pudo crear: " + err.message, "error");
    } finally {
      setBtnLoading(btnCreate, false);
    }
  }

  // ---------- Daily log (solo lectura) ----------

  function renderDailyLogEntryBody(entry) {
    const cabecera = "Sprint " + fmt(entry.sprint, "?") + " · Día " + fmt(entry.dia, "?");
    const progreso = entry.progreso || [];
    const progresoHtml = progreso.length
      ? '<table class="data-table"><thead><tr><th>HU</th><th>Estado</th><th>Lo que se hizo</th><th>Lo que se hará</th><th>Bloqueos</th></tr></thead><tbody>' +
        progreso
          .map(
            (p) =>
              "<tr><td>" + escapeHtml(fmt(p.hu)) + "</td><td>" + escapeHtml(fmt(p.estado)) + "</td><td>" +
              escapeHtml(fmt(p.loQueSeHizo)) + "</td><td>" + escapeHtml(fmt(p.loQueSeHara)) + "</td><td>" +
              escapeHtml(fmt(p.bloqueos)) + "</td></tr>"
          )
          .join("") +
        "</tbody></table>"
      : emptyInline("Sin tabla de progreso en esta entrada.");

    const actualizaciones = entry.actualizacionesGee || [];
    const actualizacionesHtml = actualizaciones.length
      ? "<ul>" + actualizaciones.map((a) => "<li>" + escapeHtml(a) + "</li>").join("") + "</ul>"
      : "";

    // "notas" es una lista de {fechaHora, autor, texto} (ver
    // prompts/paso-4/daily-log.md) — cada nota atribuida a quién la escribió.
    // Los dailylogs de antes de este formato llegan como una única nota sin
    // autor/fechaHora (ver dailylog.js, compatibilidad hacia atrás).
    const notas = entry.notas || [];
    const notasHtml = notas.length
      ? "<ul class=\"notas-lista\">" +
        notas
          .map((n) => {
            const meta = [n.fechaHora, n.autor].filter(Boolean).join(" · ");
            return (
              "<li>" +
              (meta ? "<span class=\"nota-meta\">" + escapeHtml(meta) + "</span> " : "") +
              escapeHtml(n.texto) +
              "</li>"
            );
          })
          .join("") +
        "</ul>"
      : "";

    return (
      "<p><em>" + escapeHtml(cabecera) + "</em></p>" +
      progresoHtml +
      (actualizacionesHtml ? "<p><strong>Actualizaciones GEE</strong></p>" + actualizacionesHtml : "") +
      (notasHtml ? "<p><strong>Notas</strong></p>" + notasHtml : "")
    );
  }

  function renderDailyLog() {
    const container = qs("#dailylog-lista");
    const logs = (state.gee && state.gee.dailylogs) || [];
    if (!logs || logs.length === 0) {
      container.innerHTML = emptyState(
        "📓",
        "Todavía no hay entradas de daily log.",
        'Disponible desde el primer día del proyecto — usa "+ Añadir nota" arriba, no hace falta esperar a un sprint activo.'
      );
      return;
    }
    const sorted = logs.slice().sort((a, b) => (a.fecha < b.fecha ? 1 : a.fecha > b.fecha ? -1 : 0));
    container.innerHTML = sorted
      .map(
        (entry, idx) =>
          "<details class=\"daily-entry\"" + (idx === 0 ? " open" : "") + "><summary>" +
          escapeHtml(fmt(entry.fecha, "Fecha desconocida")) +
          "</summary>" +
          renderDailyLogEntryBody(entry) +
          "</details>"
      )
      .join("");
  }

  function setupNuevaNotaForm() {
    const btnAbrir = qs("#btn-nueva-nota");
    const form = qs("#form-nueva-nota");
    const btnCrear = qs("#btn-crear-nota");
    const btnCancelar = qs("#btn-cancelar-nota");
    if (!btnAbrir || !form) return;

    btnAbrir.addEventListener("click", () => form.classList.toggle("open"));
    btnCancelar.addEventListener("click", () => form.classList.remove("open"));

    btnCrear.addEventListener("click", async () => {
      const fecha = qs("#nota-fecha").value || null;
      const autor = qs("#nota-autor").value;
      const texto = qs("#nota-texto").value;
      if (!texto.trim()) {
        showToast("Escribe algo en la nota antes de añadirla.", "error");
        return;
      }
      setBtnLoading(btnCrear, true, "Añadiendo…");
      try {
        // OJO: igual que el resto de endpoints POST del GEE, la respuesta
        // envuelve el snapshot ({ fecha, creado, snapshot }) en vez de
        // devolverlo directamente — ver createNewRecord() para el mismo caso.
        const resp = await apiSend("POST", "/api/dailylog", { confirm: true, fecha, autor, texto });
        state = resp.snapshot;
        renderAll();
        showToast("Nota añadida al daily log.", "success");
        qs("#nota-texto").value = "";
        form.classList.remove("open");
      } catch (err) {
        console.error(err);
        showToast("No se pudo añadir la nota: " + err.message, "error");
      } finally {
        setBtnLoading(btnCrear, false);
      }
    });
  }

  // ------------------------------------------------------------------
  // TAB: Requisitos (Paso -1 legacy + Paso 0) — SOLO LECTURA
  //
  // A diferencia de la pestaña GEE, aquí no hay edición ni formularios de
  // alta: el usuario no lo pidió para estos datos, y añadir edición
  // implicaría escribir writers nuevos para output-paso-legacy/ y
  // output-paso-0/ que quedan fuera de este encargo. Sigue el mismo patrón
  // de renderizado de solo lectura que la pestaña "Proyecto".
  // ------------------------------------------------------------------

  function renderRequisitosTab() {
    renderLegacySection();
    renderPaso0Section();
  }

  // ---------- Análisis Legacy (Paso -1) ----------

  const LEGACY_ESTADO_INFO = {
    claro: { emoji: "✅", label: "Claro", color: "#16a34a", clase: "legacy-claro" },
    contradictorio: { emoji: "⚠️", label: "Contradictorio", color: "#ca8a04", clase: "legacy-contradictorio" },
    ambiguo: { emoji: "❓", label: "Ambiguo", color: "#7c3aed", clase: "legacy-ambiguo" },
    inexistente: { emoji: "🔲", label: "Inexistente", color: "#6b7280", clase: "legacy-inexistente" },
  };

  function legacyEstadoKey(raw) {
    if (!raw) return null;
    const v = String(raw).toLowerCase();
    if (v.includes("✅") || v.includes("claro")) return "claro";
    if (v.includes("⚠") || v.includes("contradictori")) return "contradictorio";
    if (v.includes("❓") || v.includes("ambigu")) return "ambiguo";
    if (v.includes("🔲") || v.includes("inexistente")) return "inexistente";
    return null;
  }

  function legacyEstadoBadge(raw) {
    const key = legacyEstadoKey(raw);
    const info = LEGACY_ESTADO_INFO[key];
    if (!info) return '<span class="badge-estado">' + escapeHtml(fmt(raw)) + "</span>";
    return '<span class="badge-estado ' + info.clase + '">' + info.emoji + " " + escapeHtml(info.label) + "</span>";
  }

  function renderLegacySection() {
    const sinDatos = qs("#legacy-sin-datos");
    const contenido = qs("#legacy-contenido");
    const legacy = state.requisitos && state.requisitos.legacy;

    if (!legacy) {
      sinDatos.classList.remove("hidden");
      contenido.classList.add("hidden");
      sinDatos.innerHTML = emptyState(
        "🗂️",
        "Todavía no se ha hecho análisis legacy, o el proyecto no lo necesitaba.",
        "Se genera en el Paso -1 (mapa-proyecto.md) cuando el proyecto parte de documentación o sistemas existentes."
      );
      return;
    }
    sinDatos.classList.add("hidden");
    contenido.classList.remove("hidden");

    qs("#legacy-version-nota").textContent =
      legacy.version === "v2"
        ? "Versión actualizada tras la entrevista con el cliente (mapa-proyecto-v2.md)."
        : "Versión inicial, todavía sin incorporar feedback de entrevista (mapa-proyecto.md).";

    renderLegacyResumenChart(legacy.resumen);
    renderLegacyResumenLateral(legacy.resumen);
    renderLegacyTabla(legacy.aspectos);
  }

  function renderLegacyResumenChart(resumen) {
    const container = qs("#chart-legacy-resumen");
    const total = ["claro", "contradictorio", "ambiguo", "inexistente"].reduce((acc, k) => acc + (resumen[k] || 0), 0);
    if (!resumen || total === 0) {
      container.innerHTML = emptyInline("Sin aspectos clasificados todavía.");
      return;
    }
    if (!ECHARTS_AVAILABLE) {
      container.innerHTML = chartUnavailableMarkup();
      return;
    }
    const chart = getOrCreateChart("chart-legacy-resumen");
    const data = ["claro", "contradictorio", "ambiguo", "inexistente"]
      .filter((k) => (resumen[k] || 0) > 0)
      .map((k) => ({ name: LEGACY_ESTADO_INFO[k].label, value: resumen[k], itemStyle: { color: LEGACY_ESTADO_INFO[k].color } }));
    chart.setOption({
      tooltip: { trigger: "item" },
      legend: { bottom: 0 },
      series: [
        {
          type: "pie",
          radius: ["45%", "70%"],
          data: data,
          label: { formatter: "{b}: {c}" },
        },
      ],
    });
  }

  function renderLegacyResumenLateral(resumen) {
    const container = qs("#legacy-resumen-lateral");
    const total = ["claro", "contradictorio", "ambiguo", "inexistente"].reduce((acc, k) => acc + (resumen[k] || 0), 0);
    if (!resumen || total === 0) {
      container.innerHTML = emptyInline("Sin datos de resumen.");
      return;
    }
    container.innerHTML = ["claro", "contradictorio", "ambiguo", "inexistente"]
      .map((k) => {
        const info = LEGACY_ESTADO_INFO[k];
        return "<p>" + info.emoji + " <strong>" + (resumen[k] || 0) + "</strong> " + info.label + "</p>";
      })
      .join("");
  }

  function renderLegacyTabla(aspectos) {
    const wrap = qs("#legacy-tabla-wrap");
    if (!aspectos || aspectos.length === 0) {
      wrap.innerHTML = emptyInline("No hay aspectos detallados en el mapa del proyecto.");
      return;
    }
    const rows = aspectos
      .map(
        (a) =>
          "<tr><td>" +
          escapeHtml(fmt(a.id)) +
          "</td><td>" +
          escapeHtml(fmt(a.aspecto)) +
          "</td><td>" +
          legacyEstadoBadge(a.estado) +
          "</td><td>" +
          escapeHtml(fmt(a.descripcion)) +
          "</td><td>" +
          escapeHtml(fmt(a.fuentes)) +
          "</td><td>" +
          escapeHtml(fmt(a.recomendacion)) +
          "</td></tr>"
      )
      .join("");
    wrap.innerHTML =
      '<table class="data-table"><thead><tr>' +
      "<th>ID</th><th>Aspecto</th><th>Estado</th><th>Descripción</th><th>Fuentes</th><th>Recomendación</th>" +
      "</tr></thead><tbody>" +
      rows +
      "</tbody></table>";
  }

  // ---------- Requisitos del cliente (Paso 0) ----------

  function renderPaso0Section() {
    const paso0 = state.requisitos && state.requisitos.paso0;
    renderPaso0Resumen(paso0);
    renderRequisitosEditableTables();
  }

  function renderPaso0Resumen(paso0) {
    const container = qs("#paso0-resumen");
    const resumen = paso0 && paso0.resumen;
    if (!resumen || (resumen.totalPeticiones === 0 && resumen.totalFuncionales === 0 && resumen.totalNoFuncionales === 0 && resumen.totalZonasIncertidumbre === 0)) {
      container.innerHTML = emptyInline("Todavía no se ha procesado el Paso 0 (peticiones/requisitos del cliente).");
      return;
    }
    const partes = [
      resumen.totalPeticiones + " peticiones",
      resumen.totalFuncionales + " RF",
      resumen.totalNoFuncionales +
        " RNF" +
        (resumen.noFuncionalesImplicitos > 0 ? " (" + resumen.noFuncionalesImplicitos + " implícitos sin confirmar)" : ""),
      resumen.totalZonasIncertidumbre + " zonas de incertidumbre",
    ];
    container.innerHTML = "<p><strong>" + partes.join(" · ") + "</strong></p>";
  }

  function moscowBadge(raw) {
    if (!raw) return "";
    const v = String(raw).toLowerCase();
    let clase = "";
    if (v.includes("must")) clase = "tag-prioridad-alta";
    else if (v.includes("should")) clase = "tag-fase-mvp";
    return '<span class="tag' + (clase ? " " + clase : "") + '">' + escapeHtml(raw) + "</span>";
  }

  // ------------------------------------------------------------------
  // Manejo de error 423 (Locked) para edición de HU de sprint
  // Nota: la pestaña "Sprint actual" en este MVP muestra las HU en modo
  // solo lectura (con el candado 🔒 cuando locked === true), pero dejamos
  // preparado el helper por si se añade edición de HU fuera de sprint activo
  // en una iteración futura, respetando el contrato PUT /api/sprint/hu/:id.
  // ------------------------------------------------------------------

  async function updateHu(id, updates) {
    try {
      const payload = Object.assign({ confirm: true }, updates);
      state = await apiSend("PUT", "/api/sprint/hu/" + encodeURIComponent(id), payload);
      renderAll();
      showToast("HU " + id + " actualizada.", "success");
    } catch (err) {
      if (err.status === 423) {
        showToast("Esta HU está en sprint activo, no se puede editar desde aquí.", "warn");
      } else {
        showToast("No se pudo actualizar la HU: " + err.message, "error");
      }
    }
  }

  // ------------------------------------------------------------------
  // Navegación por pestañas
  // ------------------------------------------------------------------

  function setupTabs() {
    qsa(".tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        qsa(".tab-btn").forEach((b) => b.classList.remove("active"));
        qsa(".tab-panel").forEach((p) => p.classList.remove("active"));
        btn.classList.add("active");
        qs("#" + btn.dataset.tab).classList.add("active");
        resizeAllCharts();
      });
    });

    // Delimitado al .tab-panel contenedor: ahora hay dos grupos de
    // subpestañas independientes (GEE y Requisitos) en la misma página —
    // sin esto, cambiar de subpestaña en uno desactivaría el estado del otro.
    qsa(".subtab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const scope = btn.closest(".tab-panel") || document;
        qsa(".subtab-btn", scope).forEach((b) => b.classList.remove("active"));
        qsa(".subtab-panel", scope).forEach((p) => p.classList.remove("active"));
        btn.classList.add("active");
        qs("#" + btn.dataset.subtab).classList.add("active");
        resizeAllCharts();
      });
    });

    qsa("[data-toggle-form]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const target = qs("#" + btn.dataset.toggleForm);
        target.classList.toggle("open");
      });
    });
  }

  function setupHeaderButtons() {
    qs("#btn-sync").addEventListener("click", doSync);
    // MODO NUBE: doGeneratePdf ya no llama al servidor ni muestra estado de
    // carga (abre la vista de impresión al instante) — sin argumentos.
    qs("#btn-pdf").addEventListener("click", doGeneratePdf);
    // Botón "Exportar requisitos a PDF" de la pestaña Requisitos: mismo
    // informe completo (PrintView.gs ya incluye la sección "Requisitos",
    // legacy + Paso 0), misma función.
    const btnPdfRequisitos = qs("#btn-pdf-requisitos");
    if (btnPdfRequisitos) {
      btnPdfRequisitos.addEventListener("click", doGeneratePdf);
    }
  }

  window.addEventListener("resize", debounce(resizeAllCharts, 150));

  function debounce(fn, wait) {
    let t;
    return function () {
      clearTimeout(t);
      t = setTimeout(fn, wait);
    };
  }

  // ------------------------------------------------------------------
  // Bootstrap
  // ------------------------------------------------------------------

  document.addEventListener("DOMContentLoaded", function () {
    if (!ECHARTS_AVAILABLE) {
      console.warn("echarts no está disponible (no se pudo cargar desde el CDN — comprueba la conexión a internet).");
    }
    setupTabs();
    setupHeaderButtons();
    setupSprintTabButtons();
    setupNuevaNotaForm();
    loadInitial();
  });
})();
</script>
