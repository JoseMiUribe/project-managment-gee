<style>
/* ==========================================================================
   PM Copilot Dashboard — estilos (copia sin cambios de dashboard/public/styles.css)
   ========================================================================== */

:root {
  --color-bg: #f4f5f7;
  --color-card-bg: #ffffff;
  --color-border: #e2e4e9;
  --color-text: #1f2430;
  --color-text-muted: #6b7280;
  --color-text-faint: #9ca3af;
  --color-primary: #2563eb;
  --color-primary-hover: #1d4ed8;
  --color-primary-bg: #eff6ff;

  --color-verde: #16a34a;
  --color-verde-bg: #dcfce7;
  --color-amarillo: #ca8a04;
  --color-amarillo-bg: #fef9c3;
  --color-rojo: #dc2626;
  --color-rojo-bg: #fee2e2;
  --color-gris: #6b7280;
  --color-gris-bg: #f1f2f4;
  --color-morado: #7c3aed;
  --color-morado-bg: #ede9fe;
  --color-gris-oscuro: #374151;
  --color-gris-oscuro-bg: #e5e7eb;

  --shadow-card: 0 1px 3px rgba(16, 24, 40, 0.08), 0 1px 2px rgba(16, 24, 40, 0.04);
  --radius: 10px;
  --radius-sm: 6px;
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--color-bg);
  color: var(--color-text);
  min-width: 1280px;
  font-size: 14px;
  line-height: 1.5;
}

button {
  font-family: inherit;
}

/* ---------- Header global ---------- */

.app-header {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 12px 24px;
  background: var(--color-card-bg);
  border-bottom: 1px solid var(--color-border);
}

.app-header .project-info h1 {
  font-size: 18px;
  margin: 0;
  font-weight: 600;
}

.app-header .project-meta {
  font-size: 12px;
  color: var(--color-text-muted);
  margin-top: 2px;
  max-width: 480px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.header-actualizado {
  font-size: 12px;
  color: var(--color-text-muted);
  white-space: nowrap;
}

.badge-cambios-pendientes {
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  background: #fff7ed;
  color: #9a3412;
  border: 1px solid #fdba74;
  border-radius: 999px;
  padding: 3px 10px;
}

.header-actualizado code {
  background: var(--color-gris-bg);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 11px;
}

.app-header .project-meta code {
  background: var(--color-gris-bg);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 11px;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--color-border);
  background: var(--color-card-bg);
  color: var(--color-text);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  transition: background 0.15s ease, border-color 0.15s ease;
}

.btn:hover:not(:disabled) {
  background: var(--color-gris-bg);
}

.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.btn-primary {
  background: var(--color-primary);
  border-color: var(--color-primary);
  color: #fff;
}

.btn-primary:hover:not(:disabled) {
  background: var(--color-primary-hover);
}

.btn-sm {
  padding: 4px 10px;
  font-size: 12px;
}

.btn-danger-text {
  color: var(--color-rojo);
}

.spinner {
  display: inline-block;
  width: 13px;
  height: 13px;
  border: 2px solid rgba(255, 255, 255, 0.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

.btn:not(.btn-primary) .spinner {
  border: 2px solid rgba(0, 0, 0, 0.15);
  border-top-color: var(--color-text);
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ---------- Toast / status banner ---------- */

#toast-container {
  position: fixed;
  top: 66px;
  right: 24px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: 380px;
}

.toast {
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-card);
  font-size: 13px;
  background: var(--color-text);
  color: #fff;
  animation: fadeIn 0.15s ease;
}

.toast.toast-error {
  background: var(--color-rojo);
}

.toast.toast-success {
  background: var(--color-verde);
}

.toast.toast-warn {
  background: var(--color-amarillo);
  color: #3a2e00;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---------- Tabs ---------- */

.tabs-nav {
  display: flex;
  gap: 4px;
  padding: 0 24px;
  background: var(--color-card-bg);
  border-bottom: 1px solid var(--color-border);
}

.tab-btn {
  padding: 12px 18px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  color: var(--color-text-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}

.tab-btn:hover {
  color: var(--color-text);
}

.tab-btn.active {
  color: var(--color-primary);
  border-bottom-color: var(--color-primary);
}

.tab-panel {
  display: none;
  padding: 24px;
  max-width: 1600px;
  margin: 0 auto;
}

.tab-panel.active {
  display: block;
}

/* ---------- Subtabs (dentro de GEE) ---------- */

.subtabs-nav {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--color-border);
}

.subtab-btn {
  padding: 8px 14px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--color-text-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}

.subtab-btn:hover {
  color: var(--color-text);
}

.subtab-btn.active {
  color: var(--color-primary);
  border-bottom-color: var(--color-primary);
}

.subtab-panel {
  display: none;
}

.subtab-panel.active {
  display: block;
}

/* ---------- Cards ---------- */

.card {
  background: var(--color-card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  padding: 18px 20px;
  margin-bottom: 20px;
}

.card h2 {
  font-size: 15px;
  margin: 0 0 14px 0;
  font-weight: 600;
}

.card h3 {
  font-size: 13px;
  margin: 0 0 10px 0;
  font-weight: 600;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.card-highlight {
  border-left: 4px solid var(--color-primary);
  background: var(--color-primary-bg);
}

.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

/* ---------- Sprint header / progreso ---------- */

.sprint-header-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 20px;
  align-items: start;
}

.sprint-objetivo {
  font-size: 14px;
  color: var(--color-text);
}

.stat-block {
  text-align: left;
}

.stat-block .stat-label {
  font-size: 12px;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.stat-block .stat-value {
  font-size: 22px;
  font-weight: 700;
  margin-top: 2px;
}

.progress-bar-track {
  width: 100%;
  height: 18px;
  background: var(--color-gris-bg);
  border-radius: 999px;
  overflow: hidden;
  margin-top: 8px;
  position: relative;
}

.progress-bar-fill {
  height: 100%;
  background: var(--color-primary);
  border-radius: 999px 0 0 999px;
  transition: width 0.3s ease;
}

.progress-bar-fill.over {
  background: var(--color-rojo);
}

.progress-bar-label {
  font-size: 12px;
  color: var(--color-text-muted);
  margin-top: 4px;
}

/* ---------- Tables ---------- */

.table-wrap {
  overflow-x: auto;
}

table.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

table.data-table th {
  text-align: left;
  padding: 8px 10px;
  background: var(--color-gris-bg);
  color: var(--color-text-muted);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  white-space: nowrap;
  position: sticky;
  top: 0;
}

table.data-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--color-border);
  vertical-align: top;
}

table.data-table tbody tr:hover {
  background: #fafbfc;
}

table.data-table tr.row-locked {
  background: #fafafa;
}

table.data-table input,
table.data-table select,
table.data-table textarea {
  width: 100%;
  padding: 4px 6px;
  border: 1px solid var(--color-border);
  border-radius: 4px;
  font-size: 12px;
  font-family: inherit;
}

table.data-table textarea {
  min-height: 40px;
  resize: vertical;
}

.cell-actions {
  white-space: nowrap;
}

.locked-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: var(--color-text-muted);
}

/* ---------- Tabla compacta GEE + panel de detalle ---------- */
/* Antes las tablas de Riesgos/Dependencias/etc. mostraban todas las columnas
   en una sola fila ancha, forzando scroll horizontal para ver el botón de
   editar. Ahora cada registro es una fila resumen (2-3 columnas) + una fila
   de detalle desplegable con todos los campos en formato vertical. */

table.data-table-compact th,
table.data-table-compact td {
  white-space: normal;
}

tr.gee-row-summary td {
  font-weight: 500;
}

tr.gee-row-detail.hidden {
  display: none;
}

tr.gee-row-detail td {
  background: var(--color-gris-bg);
  padding: 14px 16px;
}

.detail-panel {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px 20px;
}

.detail-field {
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 0;
}

.detail-field label {
  font-size: 11px;
  font-weight: 600;
  color: var(--color-text-muted);
  text-transform: uppercase;
}

.detail-value {
  font-size: 13px;
  word-break: break-word;
}

.detail-value input,
.detail-value select,
.detail-value textarea {
  width: 100%;
  padding: 5px 8px;
  border: 1px solid var(--color-border);
  border-radius: 4px;
  font-size: 13px;
  font-family: inherit;
}

.detail-value textarea {
  min-height: 50px;
  resize: vertical;
}

.detail-actions {
  grid-column: 1 / -1;
  display: flex;
  gap: 8px;
  padding-top: 4px;
  border-top: 1px solid var(--color-border);
  margin-top: 4px;
}

/* ---------- Desplegable relacional (checkboxes hacia otros registros GEE) ---------- */

.rel-picker {
  display: flex;
  flex-direction: column;
  gap: 10px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  padding: 10px;
  max-height: 220px;
  overflow-y: auto;
}

.rel-picker-grupo {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.rel-picker-grupo-titulo {
  font-size: 11px;
  font-weight: 600;
  color: var(--color-text-muted);
  text-transform: uppercase;
  margin-bottom: 2px;
}

.rel-picker-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  cursor: pointer;
}

.rel-picker-item input[type="checkbox"] {
  margin: 0;
}

.rel-picker-add {
  align-self: flex-start;
  margin-top: 4px;
}

.rel-picker-inline-form {
  border: 1px dashed var(--color-border);
  border-radius: var(--radius-sm);
  padding: 10px;
  margin-top: 6px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ---------- Descartar / Eliminar ---------- */

tr.gee-row-summary.gee-row-descartada td {
  text-decoration: line-through;
  color: var(--color-text-muted);
}

.badge-descartado {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  color: var(--color-rojo);
  margin-right: 8px;
}

/* ---------- Estado visual "de un vistazo" (resuelto / bloqueado) ----------
   Resuelto: fila con fondo verde suave, se va al final de la tabla (igual
   que Descartado). Bloqueado: fondo rojo suave para advertir a simple vista
   sin tener que abrir el detalle. Ver estadoVisualDeFila en AppJs.html. */

tr.gee-row-summary.gee-row-resuelta td {
  background: var(--color-verde-bg);
}

tr.gee-row-summary.gee-row-bloqueada td {
  background: var(--color-rojo-bg);
}

.badge-resuelto {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--color-verde);
  margin-right: 8px;
}

.badge-bloqueado {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--color-rojo);
  margin-right: 8px;
}

.descarte-banner {
  grid-column: 1 / -1;
  background: var(--color-gris-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  font-size: 13px;
}

.motivo-inline-form {
  border: 1px dashed var(--color-border);
  border-radius: var(--radius-sm);
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.motivo-inline-form label {
  font-size: 11px;
  font-weight: 600;
  color: var(--color-text-muted);
  text-transform: uppercase;
}

.motivo-inline-form textarea {
  padding: 6px 8px;
  border: 1px solid var(--color-border);
  border-radius: 4px;
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
}

/* ---------- Badges RAG ---------- */

.badge-rag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}

.badge-rag.rag-verde,
.badge-rag.rag-green {
  background: var(--color-verde-bg);
  color: var(--color-verde);
}

.badge-rag.rag-amarillo,
.badge-rag.rag-yellow {
  background: var(--color-amarillo-bg);
  color: var(--color-amarillo);
}

.badge-rag.rag-rojo,
.badge-rag.rag-red {
  background: var(--color-rojo-bg);
  color: var(--color-rojo);
}

.badge-rag.rag-gris,
.badge-rag.rag-desconocido {
  background: var(--color-gris-bg);
  color: var(--color-gris);
}

.badge-estado {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  background: var(--color-gris-bg);
  color: var(--color-text-muted);
  white-space: nowrap;
}

/* Estados de HU/subtarea: Pendiente / En curso / Bloqueada / Hecho / Descartada */
.badge-estado-gris {
  background: var(--color-gris-bg);
  color: var(--color-text-muted);
}

.badge-estado-azul {
  background: var(--color-primary-bg);
  color: var(--color-primary);
}

.badge-estado-rojo {
  background: var(--color-rojo-bg);
  color: var(--color-rojo);
}

.badge-estado-verde {
  background: var(--color-verde-bg);
  color: var(--color-verde);
}

.badge-estado-muted {
  background: var(--color-gris-oscuro-bg);
  color: var(--color-gris-oscuro);
  text-decoration: line-through;
}

/* ---------- Empty states ---------- */

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--color-text-muted);
}

.empty-state .empty-icon {
  font-size: 32px;
  margin-bottom: 8px;
  opacity: 0.6;
}

.empty-state p {
  margin: 4px 0;
  font-size: 13px;
}

.empty-state-inline {
  padding: 14px;
  color: var(--color-text-faint);
  font-size: 13px;
  font-style: italic;
}

/* ---------- Charts ---------- */

.chart-box {
  width: 100%;
  height: 280px;
}

.chart-box.chart-sm {
  height: 220px;
}

.chart-unavailable {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 220px;
  background: var(--color-gris-bg);
  border-radius: var(--radius-sm);
  color: var(--color-text-muted);
  font-size: 13px;
  text-align: center;
  padding: 12px;
}

/* ---------- Epicas / roadmap ---------- */

.epica-card {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 10px;
}

.epica-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.epica-card-header strong {
  font-size: 13px;
}

.epica-tags {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  background: var(--color-gris-bg);
  color: var(--color-text-muted);
  white-space: nowrap;
}

.tag.tag-fase-mvp {
  background: var(--color-primary-bg);
  color: var(--color-primary);
}

.tag.tag-prioridad-alta {
  background: var(--color-rojo-bg);
  color: var(--color-rojo);
}

.epica-desc {
  margin-top: 6px;
  font-size: 12px;
  color: var(--color-text-muted);
}

/* ---------- Roadmap cliente timeline ---------- */

.timeline-list {
  list-style: none;
  margin: 0;
  padding: 0;
}

.timeline-list li {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--color-border);
}

.timeline-list li:last-child {
  border-bottom: none;
}

.timeline-confianza {
  font-size: 16px;
  flex-shrink: 0;
}

.timeline-body strong {
  font-size: 13px;
  display: block;
}

/* ---------- Tab Requisitos: badges de estado legacy (Paso -1) ---------- */
/* ✅ Claro = verde, ⚠️ Contradictorio = ámbar, ❓ Ambiguo = morado,
   🔲 Inexistente = gris oscuro. Reutiliza la forma de .badge-estado. */

.badge-estado.legacy-claro {
  background: var(--color-verde-bg);
  color: var(--color-verde);
}

.badge-estado.legacy-contradictorio {
  background: var(--color-amarillo-bg);
  color: var(--color-amarillo);
}

.badge-estado.legacy-ambiguo {
  background: var(--color-morado-bg);
  color: var(--color-morado);
}

.badge-estado.legacy-inexistente {
  background: var(--color-gris-oscuro-bg);
  color: var(--color-gris-oscuro);
}

/* Fila de RNF implícito (Paso 0), no confirmado todavía por el cliente. */
.row-implicito {
  background: var(--color-amarillo-bg);
}

.timeline-body span {
  font-size: 12px;
  color: var(--color-text-muted);
}

/* ---------- Card header con acciones a la derecha ---------- */

.card-header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.card-header-row h2 {
  margin: 0;
}

.card-header-actions {
  display: flex;
  gap: 8px;
}

/* ---------- Sprint actual: HU agrupadas por épica ---------- */

.epica-group {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
}

.epica-group > summary {
  padding: 10px 14px;
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  list-style: none;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--color-gris-bg);
  border-radius: var(--radius-sm);
}

.epica-group > summary::-webkit-details-marker {
  display: none;
}

.epica-group > summary::before {
  content: "▶";
  font-size: 10px;
  color: var(--color-text-muted);
  transition: transform 0.15s ease;
}

.epica-group[open] > summary::before {
  transform: rotate(90deg);
}

.epica-hu-list {
  padding: 8px 14px 12px 24px;
}

.hu-item {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  margin: 6px 0;
}

.hu-item > summary {
  padding: 8px 12px;
  cursor: pointer;
  list-style: none;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
}

.hu-item > summary::-webkit-details-marker {
  display: none;
}

.hu-item > summary::before {
  content: "▶";
